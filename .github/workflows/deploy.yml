name: Deploy Intelligent HRM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh

            export PATH=$PATH:/home/khanh/.nvm/versions/node/v22.22.3/bin

            cd /home/khanh/app

            echo "Pull latest code"
            git pull origin main

            echo "Backend update"
            cd backend
            npm install
            pm2 restart backend

            echo "Deepface service update"
            cd ../deepface_service
            pm2 restart deepface-service

            echo "Frontend build"
            cd ../frontend
            npm install
            npm run build
            pm2 restart frontend
